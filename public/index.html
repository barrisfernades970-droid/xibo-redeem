<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兑换码领取工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 登录页面样式 */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 40px);
    }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 8px;
      color: #333;
    }

    .login-card p {
      color: #666;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      outline: none;
      border-color: #667eea;
    }

    .login-card .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
    }

    .main-content {
      display: none;
    }

    .main-content.show {
      display: block;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      position: relative;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
    }

    .header-right {
      position: absolute;
      right: 0;
      top: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .admin-badge {
      background: rgba(255, 193, 7, 0.9);
      color: #333;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }

    .stat-item {
      text-align: center;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f8f9fa;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #e9ecef;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 14px;
    }

    .claim-section {
      text-align: center;
      padding: 20px 0;
    }

    .claim-btn {
      font-size: 20px;
      padding: 16px 48px;
    }

    .claim-result {
      margin-top: 24px;
      text-align: left;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .result-item.empty {
      background: #fff3cd;
      color: #856404;
    }

    .result-type {
      font-weight: 600;
      color: #333;
    }

    .result-code {
      font-family: 'Courier New', monospace;
      background: #e9ecef;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 14px;
    }

    .copy-all-btn {
      margin-top: 16px;
      width: 100%;
    }

    .types-list {
      margin-top: 16px;
    }

    .type-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .type-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .type-name {
      font-weight: 500;
    }

    .type-count {
      font-size: 14px;
      color: #666;
    }

    .type-count .available {
      color: #28a745;
      font-weight: 600;
    }

    .type-count .used {
      color: #999;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-group textarea {
      min-height: 120px;
      font-family: 'Courier New', monospace;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 10px 20px;
      background: #f8f9fa;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
    }

    .tab.active {
      background: #667eea;
      color: white;
    }

    .tab:hover:not(.active) {
      background: #e9ecef;
    }

    .tab.locked {
      position: relative;
    }

    .tab.locked::after {
      content: '🔒';
      margin-left: 4px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .records-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .records-table th,
    .records-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    .records-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
    }

    .records-table tr:hover {
      background: #f8f9fa;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background: #333;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #28a745;
    }

    .toast.error {
      background: #dc3545;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state p {
      margin-bottom: 16px;
    }

    /* 管理员验证弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .modal-card h3 {
      margin-bottom: 8px;
      color: #333;
    }

    .modal-card p {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .modal-card input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    .modal-card input:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .modal-buttons .btn {
      flex: 1;
    }

    @media (max-width: 600px) {
      .form-row {
        flex-direction: column;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .header-right {
        position: static;
        justify-content: center;
        margin-top: 12px;
      }

      .header {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- 登录页面 -->
  <div class="login-container" id="loginPage">
    <div class="login-card">
      <h2>兑换码领取工具</h2>
      <p>喜播学堂 · 请输入访问密码</p>
      <input type="password" id="passwordInput" placeholder="请输入密码" onkeypress="if(event.key==='Enter')login()">
      <button class="btn btn-primary" onclick="login()">登录</button>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main-content" id="mainContent">
    <div class="container">
      <div class="header">
        <h1>兑换码领取工具</h1>
        <p>喜播学堂 · 快速领取兑换码</p>
        <div class="header-right">
          <span class="user-name" id="userNameDisplay" onclick="showNameModal()" style="cursor: pointer; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 12px; font-size: 14px;">
            未设置昵称
          </span>
          <span class="admin-badge" id="adminBadge" style="display: none;">管理员</span>
          <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="card">
        <div class="card-title">📊 数据统计</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalCodes">0</div>
            <div class="stat-label">总兑换码</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="availableCodes">0</div>
            <div class="stat-label">可领取</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="usedCodes">0</div>
            <div class="stat-label">已领取</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalClaims">0</div>
            <div class="stat-label">领取次数</div>
          </div>
        </div>
      </div>

      <!-- 标签页 -->
      <div class="card">
        <div class="tabs">
          <button class="tab active" data-tab="claim">领取兑换码</button>
          <button class="tab locked" data-tab="manage" id="manageTab">管理兑换码</button>
          <button class="tab" data-tab="records">领取记录</button>
        </div>

        <!-- 领取兑换码 -->
        <div class="tab-content active" id="claim-tab">
          <div class="claim-section" id="claimAllSection">
            <button class="btn btn-primary claim-btn" id="claimBtn" onclick="claimAll()">
              🎁 一键领取全部
            </button>
            <p style="margin-top: 12px; color: #666; font-size: 14px;">
              点击后将从每种类型中领取一个兑换码
            </p>
          </div>

          <hr style="margin: 24px 0; border: none; border-top: 1px solid #eee;">

          <div class="card-title">📋 选择性领取</div>
          <p style="color: #666; font-size: 14px; margin-bottom: 16px;">点击领取按钮，单独领取某种类型的兑换码</p>
          <div id="claimTypesList">
            <!-- 动态生成 -->
          </div>

          <div class="claim-result" id="claimResult" style="display: none;">
            <div class="card-title">本次领取结果</div>
            <div id="resultList"></div>
            <button class="btn btn-secondary copy-all-btn" onclick="copyAll()">
              📋 一键复制全部
            </button>
          </div>
        </div>

        <!-- 管理兑换码 -->
        <div class="tab-content" id="manage-tab">
          <div class="form-group">
            <label>添加兑换码类型</label>
            <div class="form-row">
              <input type="text" id="newTypeName" placeholder="例如：课程A码、会员码...">
              <button class="btn btn-primary btn-sm" onclick="addType()">添加</button>
            </div>
          </div>

          <div class="types-list" id="typesList">
            <!-- 动态生成 -->
          </div>

          <hr style="margin: 24px 0; border: none; border-top: 1px solid #eee;">

          <div class="card-title">导入兑换码</div>
          <div class="form-group">
            <label>选择类型</label>
            <select id="importType">
              <option value="">请选择兑换码类型</option>
            </select>
          </div>
          <div class="form-group">
            <label>兑换码列表（每行一个）</label>
            <textarea id="importCodes" placeholder="ABC123&#10;DEF456&#10;GHI789&#10;..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="importCodes()">导入兑换码</button>
        </div>

        <!-- 领取记录 -->
        <div class="tab-content" id="records-tab">
          <div id="recordsList">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 管理员验证弹窗 -->
  <div class="modal-overlay" id="adminModal">
    <div class="modal-card">
      <h3>🔒 需要管理员权限</h3>
      <p>管理兑换码需要输入管理员密码</p>
      <input type="password" id="adminPasswordInput" placeholder="请输入管理员密码" onkeypress="if(event.key==='Enter')verifyAdmin()">
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeAdminModal()">取消</button>
        <button class="btn btn-primary" onclick="verifyAdmin()">验证</button>
      </div>
    </div>
  </div>

  <!-- 设置名字弹窗 -->
  <div class="modal-overlay" id="nameModal">
    <div class="modal-card">
      <h3>👤 设置带班昵称</h3>
      <p>请输入你的企业微信带班昵称，否则无法领取兑换码</p>
      <input type="text" id="nameInput" placeholder="请输入企业微信带班昵称" onkeypress="if(event.key==='Enter')saveName()">
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="saveName()" style="width: 100%;">确认</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '/api';
    let token = localStorage.getItem('token');
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    let userName = localStorage.getItem('userName') || '';

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 带认证的 fetch
    async function authFetch(url, options = {}) {
      options.headers = {
        ...options.headers,
        'Authorization': `Bearer ${token}`
      };
      return fetch(url, options);
    }

    // 检查登录状态
    async function checkAuth() {
      if (!token) {
        showLogin();
        return false;
      }
      
      try {
        const res = await authFetch(`${API_BASE}/check`);
        const data = await res.json();
        if (data.success && data.data.loggedIn) {
          isAdmin = data.data.isAdmin;
          localStorage.setItem('isAdmin', isAdmin);
          showMain();
          return true;
        } else {
          localStorage.removeItem('token');
          localStorage.removeItem('isAdmin');
          token = null;
          isAdmin = false;
          showLogin();
          return false;
        }
      } catch (e) {
        showLogin();
        return false;
      }
    }

    function showLogin() {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('mainContent').classList.remove('show');
    }

    function showMain() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainContent').classList.add('show');
      
      // 显示/隐藏管理员标识
      document.getElementById('adminBadge').style.display = isAdmin ? 'inline-block' : 'none';
      
      // 更新管理标签样式
      const manageTab = document.getElementById('manageTab');
      if (isAdmin) {
        manageTab.classList.remove('locked');
      } else {
        manageTab.classList.add('locked');
      }
      
      // 显示/隐藏"一键领取全部"（仅管理员可见）
      document.getElementById('claimAllSection').style.display = isAdmin ? 'block' : 'none';
      
      // 显示用户名字
      updateUserNameDisplay();
      
      // 如果没有设置名字，弹出设置名字的弹窗
      if (!userName) {
        setTimeout(() => showNameModal(), 500);
      }
      
      loadStats();
      loadTypes();
    }

    // 更新用户名显示
    function updateUserNameDisplay() {
      const display = document.getElementById('userNameDisplay');
      if (userName) {
        display.textContent = '👤 ' + userName;
        display.style.background = 'rgba(40, 167, 69, 0.3)';
      } else {
        display.textContent = '未设置昵称';
        display.style.background = 'rgba(220, 53, 69, 0.3)';
      }
    }

    // 显示设置名字弹窗
    function showNameModal() {
      document.getElementById('nameModal').classList.add('show');
      const input = document.getElementById('nameInput');
      input.value = userName;
      input.focus();
    }

    // 关闭设置名字弹窗
    function closeNameModal() {
      document.getElementById('nameModal').classList.remove('show');
    }

    // 保存名字
    function saveName() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) {
        showToast('请输入企业微信带班昵称', 'error');
        return;
      }
      userName = name;
      localStorage.setItem('userName', userName);
      updateUserNameDisplay();
      closeNameModal();
      showToast('昵称设置成功，现在可以领取兑换码了');
    }

    // 登录
    async function login() {
      const password = document.getElementById('passwordInput').value;
      if (!password) {
        showToast('请输入密码', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        
        if (data.success) {
          token = data.data.token;
          isAdmin = data.data.isAdmin;
          localStorage.setItem('token', token);
          localStorage.setItem('isAdmin', isAdmin);
          showMain();
          showToast(isAdmin ? '管理员登录成功' : '登录成功');
        } else {
          showToast(data.error || '密码错误', 'error');
        }
      } catch (e) {
        showToast('登录失败', 'error');
      }
    }

    // 退出登录
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('isAdmin');
      token = null;
      isAdmin = false;
      showLogin();
      showToast('已退出登录');
    }

    // 管理员验证弹窗
    function showAdminModal() {
      document.getElementById('adminModal').classList.add('show');
      document.getElementById('adminPasswordInput').value = '';
      document.getElementById('adminPasswordInput').focus();
    }

    function closeAdminModal() {
      document.getElementById('adminModal').classList.remove('show');
    }

    async function verifyAdmin() {
      const password = document.getElementById('adminPasswordInput').value;
      if (!password) {
        showToast('请输入管理员密码', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        
        if (data.success && data.data.isAdmin) {
          token = data.data.token;
          isAdmin = true;
          localStorage.setItem('token', token);
          localStorage.setItem('isAdmin', isAdmin);
          closeAdminModal();
          showMain();
          showToast('管理员验证成功');
          
          // 切换到管理页面
          switchTab('manage');
        } else {
          showToast('管理员密码错误', 'error');
        }
      } catch (e) {
        showToast('验证失败', 'error');
      }
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById(`${tabName}-tab`).classList.add('active');
      
      if (tabName === 'records') {
        loadRecords();
      }
    }

    // 加载统计数据
    async function loadStats() {
      try {
        const res = await authFetch(`${API_BASE}/stats`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('totalCodes').textContent = data.data.totalCodes;
          document.getElementById('availableCodes').textContent = data.data.availableCodes;
          document.getElementById('usedCodes').textContent = data.data.usedCodes;
          document.getElementById('totalClaims').textContent = data.data.totalClaims;
        } else if (data.error === '请先登录') {
          showLogin();
        }
      } catch (error) {
        console.error('加载统计失败:', error);
      }
    }

    // 加载兑换码类型
    async function loadTypes() {
      try {
        const res = await authFetch(`${API_BASE}/types`);
        const data = await res.json();
        
        if (data.success) {
          renderTypesList(data.data);
          renderTypeSelect(data.data);
          renderClaimTypesList(data.data);
        } else if (data.error === '请先登录') {
          showLogin();
        }
      } catch (error) {
        console.error('加载类型失败:', error);
      }
    }

    // 渲染领取页面的类型列表
    function renderClaimTypesList(types) {
      const container = document.getElementById('claimTypesList');
      
      if (types.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>还没有兑换码类型</p>
            <p style="font-size: 14px;">请联系管理员添加</p>
          </div>
        `;
        return;
      }

      container.innerHTML = types.map(type => `
        <div class="type-item">
          <div class="type-info">
            <span class="type-name">${type.name}</span>
            <span class="type-count">
              <span class="available">${type.available_count}</span> 可用
            </span>
          </div>
          <button class="btn btn-primary btn-sm claim-type-btn" onclick="claimOne(${type.id}, '${type.name}')" ${type.available_count === 0 || needCopy ? 'disabled' : ''} style="${needCopy ? 'opacity: 0.5;' : ''}">
            ${type.available_count === 0 ? '已领完' : (needCopy ? '请先复制' : '领取')}
          </button>
        </div>
      `).join('');
    }

    // 单独领取某种类型
    async function claimOne(typeId, typeName) {
      // 检查是否需要先复制
      if (needCopy) {
        showToast('请先点击"一键复制"保存兑换码', 'error');
        return;
      }

      // 检查是否设置了名字
      if (!userName) {
        showNameModal();
        showToast('请先设置企业微信带班昵称', 'error');
        return;
      }

      try {
        const res = await authFetch(`${API_BASE}/claim/${typeId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ claimer: userName })
        });
        const data = await res.json();
        
        if (data.success) {
          needCopy = true; // 标记需要复制
          showToast(`领取成功，请点击"一键复制"保存`);
          loadTypes();
          loadStats();
          
          // 显示结果
          lastClaimResult = [data.data];
          renderClaimResult([data.data]);
          updateClaimButtons();
        } else {
          showToast(data.error, 'error');
        }
      } catch (error) {
        showToast('领取失败', 'error');
      }
    }

    // 更新领取按钮状态
    function updateClaimButtons() {
      // 重新渲染类型列表以更新按钮状态
      authFetch(`${API_BASE}/types`).then(res => res.json()).then(data => {
        if (data.success) {
          renderClaimTypesList(data.data);
        }
      });
    }

    // 渲染类型列表
    function renderTypesList(types) {
      const container = document.getElementById('typesList');
      
      if (types.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>还没有添加兑换码类型</p>
            <p style="font-size: 14px;">在上方输入类型名称并点击"添加"</p>
          </div>
        `;
        return;
      }

      container.innerHTML = types.map(type => `
        <div class="type-item">
          <div class="type-info">
            <span class="type-name">${type.name}</span>
            <span class="type-count">
              <span class="available">${type.available_count}</span> 可用 / 
              <span class="used">${type.used_count}</span> 已用
            </span>
          </div>
          <button class="btn btn-danger btn-sm" onclick="deleteType(${type.id}, '${type.name}')">删除</button>
        </div>
      `).join('');
    }

    // 渲染类型选择框
    function renderTypeSelect(types) {
      const select = document.getElementById('importType');
      select.innerHTML = '<option value="">请选择兑换码类型</option>' +
        types.map(type => `<option value="${type.id}">${type.name} (${type.available_count} 可用)</option>`).join('');
    }

    // 添加类型
    async function addType() {
      const name = document.getElementById('newTypeName').value.trim();
      if (!name) {
        showToast('请输入类型名称', 'error');
        return;
      }

      try {
        const res = await authFetch(`${API_BASE}/types`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const data = await res.json();
        
        if (data.success) {
          showToast('添加成功');
          document.getElementById('newTypeName').value = '';
          loadTypes();
        } else if (data.error === '需要管理员权限') {
          showToast('需要管理员权限', 'error');
        } else {
          showToast(data.error, 'error');
        }
      } catch (error) {
        showToast('添加失败', 'error');
      }
    }

    // 删除类型
    async function deleteType(id, name) {
      if (!confirm(`确定要删除"${name}"吗？\n该类型下的所有兑换码也会被删除！`)) {
        return;
      }

      try {
        const res = await authFetch(`${API_BASE}/types/${id}`, { method: 'DELETE' });
        const data = await res.json();
        
        if (data.success) {
          showToast('删除成功');
          loadTypes();
          loadStats();
        } else if (data.error === '需要管理员权限') {
          showToast('需要管理员权限', 'error');
        } else {
          showToast(data.error, 'error');
        }
      } catch (error) {
        showToast('删除失败', 'error');
      }
    }

    // 导入兑换码
    async function importCodes() {
      const typeId = document.getElementById('importType').value;
      const codesText = document.getElementById('importCodes').value;

      if (!typeId) {
        showToast('请选择兑换码类型', 'error');
        return;
      }

      const codes = codesText.split('\n').filter(c => c.trim());
      if (codes.length === 0) {
        showToast('请输入兑换码', 'error');
        return;
      }

      try {
        const res = await authFetch(`${API_BASE}/codes/import`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type_id: parseInt(typeId), codes })
        });
        const data = await res.json();
        
        if (data.success) {
          showToast(data.data.message);
          document.getElementById('importCodes').value = '';
          loadTypes();
          loadStats();
        } else if (data.error === '需要管理员权限') {
          showToast('需要管理员权限', 'error');
        } else {
          showToast(data.error, 'error');
        }
      } catch (error) {
        showToast('导入失败', 'error');
      }
    }

    // 一键领取
    let lastClaimResult = [];
    let needCopy = false; // 是否需要先复制
    
    async function claimAll() {
      // 检查是否需要先复制
      if (needCopy) {
        showToast('请先点击"一键复制"保存兑换码', 'error');
        return;
      }

      // 检查是否设置了名字
      if (!userName) {
        showNameModal();
        showToast('请先设置企业微信带班昵称', 'error');
        return;
      }

      const btn = document.getElementById('claimBtn');
      btn.disabled = true;
      btn.textContent = '领取中...';

      try {
        const res = await authFetch(`${API_BASE}/claim`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ claimer: userName })
        });
        const data = await res.json();
        
        if (data.success) {
          lastClaimResult = data.data;
          needCopy = true; // 标记需要复制
          renderClaimResult(data.data);
          showToast('领取成功，请点击"一键复制"保存');
          loadTypes();
          loadStats();
          updateClaimButtons();
        } else {
          showToast(data.error, 'error');
        }
      } catch (error) {
        showToast('领取失败', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🎁 一键领取全部';
      }
    }

    // 渲染领取结果
    function renderClaimResult(results) {
      const container = document.getElementById('claimResult');
      const list = document.getElementById('resultList');
      
      container.style.display = 'block';
      
      list.innerHTML = results.map(item => {
        if (item.code) {
          return `
            <div class="result-item">
              <span class="result-type">${item.type_name}</span>
              <span class="result-code">${item.code}</span>
            </div>
          `;
        } else {
          return `
            <div class="result-item empty">
              <span class="result-type">${item.type_name}</span>
              <span>${item.message}</span>
            </div>
          `;
        }
      }).join('');
    }

    // 一键复制
    function copyAll() {
      const validResults = lastClaimResult.filter(r => r.code);
      if (validResults.length === 0) {
        showToast('没有可复制的兑换码', 'error');
        return;
      }

      const text = validResults.map(r => `${r.type_name}：${r.code}`).join('\n');
      
      navigator.clipboard.writeText(text).then(() => {
        needCopy = false; // 清除需要复制的状态
        updateClaimButtons();
        showToast('已复制到剪贴板，可以继续领取');
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        needCopy = false; // 清除需要复制的状态
        updateClaimButtons();
        showToast('已复制到剪贴板，可以继续领取');
      });
    }

    // 加载领取记录
    async function loadRecords() {
      try {
        const res = await authFetch(`${API_BASE}/records`);
        const data = await res.json();
        
        if (data.success) {
          renderRecords(data.data.records);
        }
      } catch (error) {
        console.error('加载记录失败:', error);
      }
    }

    // 渲染领取记录
    function renderRecords(records) {
      const container = document.getElementById('recordsList');
      
      if (records.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>还没有领取记录</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <table class="records-table">
          <thead>
            <tr>
              <th>兑换码类型</th>
              <th>兑换码</th>
              <th>领取人</th>
              <th>领取时间</th>
            </tr>
          </thead>
          <tbody>
            ${records.map(r => `
              <tr>
                <td>${r.typeName}</td>
                <td><code>${r.code}</code></td>
                <td>${r.claimer}</td>
                <td>${new Date(r.claimedAt).toLocaleString('zh-CN')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // 标签页切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        
        // 如果点击管理标签且不是管理员，弹出验证
        if (tabName === 'manage' && !isAdmin) {
          showAdminModal();
          return;
        }
        
        switchTab(tabName);
      });
    });

    // 初始化
    checkAuth();
  </script>
</body>
</html>
